name: kubernetes CI
permissions:
  contents: write
on:
  push:
    branches:
      - main

jobs:
  pyapp-ci:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout 
      uses: actions/checkout@v4
    - name: Install 
      run: |
        sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 \
            -O /usr/bin/yq
        sudo chmod +x /usr/bin/yq
    - name: Trim Sha for tag
      run: |
        SHORT_SHA=${GITHUB_SHA::7}
        echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
        echo ${GITHUB_ENV}
    - name: Build docker image
      run: docker build -t nbhardwaj/gha-pyapp:${env.SHORT_SHA} .
    - name: Login to dockerhub
      uses: docker/login-action@v3
      with:
        username: "${{ secrets.DOCKER_USERNAME }}"
        password: "${{ secrets.DOCKER_PASSWD }}"
    - name: Docker Build and Push
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: nbhardwaj/gha-pyapp:${env.SHORT_SHA}
    - name: update image tag
      run: |
        yq -i '.spec.template.spec.containers[0].image = "nbhardwaj/gha-pyapp:${env.SHORT_SHA}" ./k8s/pyapp-deployment.yaml
        cat k8s/pyapp-deployment.yml
    - name: commit the chages
      run: |
        git config user.email "github-actions@github.com"
        git config user.name "GitHub Actions[bot]"
        git add k8s/pyapp-deployment.yml
        git commit -m "Update image tag to ${env.SHORT_SHA}"
        git push


    