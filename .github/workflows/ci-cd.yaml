name: kubernetes CI
on:
  push:
    branches:
      - main

jobs:
  pyapp-ci:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout 
      uses: actions/checkout@v4
    - name: Build docker image
      run: docker build -t nbhardwaj/gha-pyapp:${GITHUB_SHA::7} .
    - name: Login to dockerhub
      uses: docker/login-action@v3
      with:
        username: "${{ secrets.DOCKER_USERNAME }}"
        password: "${{ secrets.DOCKER_PASSWD }}"
    - name: Docker push
      run: docker push nbhardwaj/gha-pyapp:${GITHUB_SHA::7}

    