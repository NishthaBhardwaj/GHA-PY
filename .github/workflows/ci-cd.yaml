name: kubernetes CI
permissions:
  contents: write
on:
  push:
    branches:
      - main

jobs:
  pyapp-ci:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout 
      uses: actions/checkout@v4
    - name: Build docker image
      run: docker build -t nbhardwaj/gha-pyapp:${GITHUB_SHA::7} .
    - name: Login to dockerhub
      uses: docker/login-action@v3
      with:
        username: "${{ secrets.DOCKER_USERNAME }}"
        password: "${{ secrets.DOCKER_PASSWD }}"
    - name: Docker build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: nbhardwaj/gha-pyapp:${{ github.sha[0:7] }}
    - name: update image tag
      run: |
        sed -i "s|image: nbhardwaj/gha-pyapp:.*|image: nbhardwaj/gha-pyapp:${GITHUB_SHA::7}|g" k8s/pyapp-deployment.yml
        cat k8s/pyapp-deployment.yml
    - name: commit the chages
      run: |
        git config user.email "github-actions@github.com"
        git config user.name "GitHub Actions[bot]"
        git add k8s/pyapp-deployment.yml
        git commit -m "Update image tag to ${GITHUB_SHA::7} [skip ci]"
        git push


    